<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Logovo VR</title>
    <link rel="icon" href="favicon.ico">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    
    <style>

        @font-face {
            font-family: 'Google Sans Code';
            src: url('/fonts/GoogleSansCode-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Google Sans Code';
            background: #0a0a0a;
            color: #00ff88;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border: 2px solid #00ff88;
            border-radius: 15px;
            background: rgba(0, 255, 136, 0.05);
        }
        
        h1 { 
            color: #ffaa00;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #00ff88;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-family: monospace;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        
        .btn {
            background: #00ff88;
            color: #000;
            padding: 18px 30px;
            border: none;
            border-radius: 8px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: #00cc66;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.4);
        }
        
        .google-btn {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .google-btn:hover {
            background: #f1f1f1;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }
        
        .google-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .separator {
            margin: 20px 0;
            text-align: center;
            color: #666;
            position: relative;
        }
        
        .separator::before,
        .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #333;
        }
        
        .separator::before { left: 0; }
        .separator::after { right: 0; }
        
        .error-message {
            color: #ff4444;
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 8px;
            display: none;
            font-size: 0.9em;
        }
        
        .success-message {
            color: #00ff88;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            display: none;
            font-size: 0.9em;
        }
        
        .links {
            text-align: center;
            margin-top: 30px;
            color: #8fd493;
        }
        
        a {
            color: #ffaa00;
            text-decoration: none;
            font-weight: bold;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Регистрация</h1>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label for="username">👤 Имя пользователя</label>
                <input type="text" id="username" placeholder="username" minlength="3">
            </div>
            
            <div class="form-group">
                <label for="phone">📱 Телефон (обязательно)</label>
                <input type="tel" id="phone" placeholder="+7 (999) 123-45-67">
            </div>
            
            <div class="form-group">
                <label for="password">🔑 Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">🔑 Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль" minlength="6">
            </div>
            
            <button type="button" onclick="registerWithEmail()" class="btn">
                📧 Зарегистрироваться с email
            </button>
            
            <div class="separator">или</div>
            
            <button type="button" onclick="registerWithGoogle()" class="btn google-btn">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Зарегистрироваться с Google
            </button>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </form>
        
        <div class="links">
            <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            <p><a href="index.html">← На главную</a></p>
        </div>
    </div>

    <script>
        // ==================== FIREBASE КОНФИГ ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBVF9ofJRXi39nF3n3wguSAG5EO5ZxyiCg",
            authDomain: "logovovr.firebaseapp.com",
            databaseURL: "https://logovovr-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "logovovr",
            storageBucket: "logovovr.firebasestorage.app",
            messagingSenderId: "292582907362",
            appId: "1:292582907362:web:399e38ee37f4b20ab52dbb"
        };
        
        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        console.log("🔥 Firebase подключён!");

        // ==================== РЕГИСТРАЦИЯ С EMAIL ====================
        async function registerWithEmail() {
            try {
                hideMessages();
                
                const email = document.getElementById('email').value.trim();
                const username = document.getElementById('username').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                // Валидация
                if (!email || !username || !phone || !password || !confirmPassword) {
                    showError('Заполните все поля');
                    return;
                }
                
                if (!email.includes('@')) {
                    showError('Введите корректный email');
                    return;
                }
                
                if (username.length < 3) {
                    showError('Имя пользователя должно быть не менее 3 символов');
                    return;
                }
                
                if (phone.replace(/\D/g, '').length < 10) {
                    showError('Введите корректный номер телефона');
                    return;
                }
                
                if (password.length < 6) {
                    showError('Пароль должен быть не менее 6 символов');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Пароли не совпадают');
                    return;
                }
                
                showStatus('Регистрация...');
                
                // Регистрация в Firebase Auth
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Создаем профиль
                await createUserProfile(user, username, phone);
                
                showSuccess('✅ Регистрация успешна! Проверьте email для подтверждения.');
                
                setTimeout(() => window.location.href = 'login.html', 3000);
                
            } catch (error) {
                handleError(error);
            }
        }

        // ==================== РЕГИСТРАЦИЯ С GOOGLE ====================
        async function registerWithGoogle() {
            try {
                hideMessages();
                showStatus('Регистрация через Google...');
                
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');
                
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                
                console.log('✅ Google пользователь:', user);
                
                // Проверяем, есть ли уже профиль
                const profileSnap = await database.ref('profiles/' + user.uid).once('value');
                
                if (!profileSnap.exists()) {
                    // Запрашиваем дополнительные данные
                    const username = prompt('Введите имя пользователя (будет отображаться в рейтинге):', user.displayName || user.email.split('@')[0]);
                    const phone = prompt('Введите номер телефона для связи:', '');
                    
                    if (!username || username.length < 3) {
                        showError('Имя пользователя обязательно (мин. 3 символа)');
                        await user.delete(); // Удаляем пользователя если не дал данные
                        return;
                    }
                    
                    // Создаем профиль
                    await createUserProfile(user, username, phone || '');
                    
                    showSuccess('✅ Регистрация через Google завершена!');
                } else {
                    showSuccess('✅ Вы уже зарегистрированы! Входим...');
                }
                
                setTimeout(() => window.location.href = 'index.html', 2000);
                
            } catch (error) {
                console.error('Google registration error:', error);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showError('Регистрация отменена');
                } else if (error.code === 'auth/unauthorized-domain') {
                    showError('Домен не авторизован');
                } else {
                    handleError(error);
                }
            }
        }

        // ==================== СОЗДАНИЕ ПРОФИЛЯ ====================
        async function createUserProfile(user, username, phone) {
            const now = Date.now();
            
            // Создаем профиль
            await database.ref('profiles/' + user.uid).set({
                id: user.uid,
                email: user.email,
                username: username,
                phone: phone,
                user_type: 'user',
                created_at: now,
                last_login_at: now,
                updated_at: now,
                invited_by: null
            });
            
            // Создаем статистику
            await database.ref('user_stats/' + user.uid).set({
                user_id: user.uid,
                username: username,
                total_brews: 0,
                tea_count: 0,
                coffee_count: 0,
                quantum_count: 0,
                total_points: 0,
                last_updated: now
            });
            
            // Отправляем подтверждение email (если не Google)
            if (!user.emailVerified) {
                await user.sendEmailVerification({
                    url: 'https://timon4ikru.github.io/LogovoVR/login.html'
                });
            }
            
            console.log('✅ Профиль создан для:', user.email);
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
        function handleError(error) {
            console.error('Error:', error);
            
            let message = 'Ошибка регистрации';
            switch (error.code) {
                case 'auth/email-already-in-use':
                    message = 'Пользователь с таким email уже существует';
                    break;
                case 'auth/invalid-email':
                    message = 'Неверный формат email';
                    break;
                case 'auth/weak-password':
                    message = 'Слишком слабый пароль';
                    break;
                case 'auth/network-request-failed':
                    message = 'Проблема с сетью';
                    break;
                default:
                    message = error.message;
            }
            showError(message);
        }
        
        function showError(message) {
            document.getElementById('errorMessage').innerHTML = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            document.getElementById('successMessage').innerHTML = message;
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showStatus(message) {
            document.getElementById('successMessage').innerHTML = '⏳ ' + message;
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        // Маска для телефона
        document.getElementById('phone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length > 0) {
                let formatted = '+7';
                if (value.length > 1) {
                    formatted += ' (' + value.substring(1, 4);
                }
                if (value.length >= 4) {
                    formatted += ') ' + value.substring(4, 7);
                }
                if (value.length >= 7) {
                    formatted += '-' + value.substring(7, 9);
                }
                if (value.length >= 9) {
                    formatted += '-' + value.substring(9, 11);
                }
                e.target.value = formatted;
            }
        });

        // Проверка авторизации
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                console.log('Уже авторизован:', user.email);
            }
        });
    </script>
</body>
</html>
