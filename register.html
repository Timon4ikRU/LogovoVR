<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Logovo VR</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: monospace;
            background: #0a0a0a;
            color: #00ff88;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border: 2px solid #00ff88;
            border-radius: 15px;
            background: rgba(0, 255, 136, 0.05);
        }
        
        h1 { 
            color: #ffaa00;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #00ff88;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-family: monospace;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        
        .btn {
            background: #00ff88;
            color: #000;
            padding: 18px 30px;
            border: none;
            border-radius: 8px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: #00cc66;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.4);
        }
        
        .error-message {
            color: #ff4444;
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 8px;
            display: none;
            font-size: 0.9em;
        }
        
        .success-message {
            color: #00ff88;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            display: none;
            font-size: 0.9em;
        }
        
        .links {
            text-align: center;
            margin-top: 30px;
            color: #8fd493;
        }
        
        a {
            color: #ffaa00;
            text-decoration: none;
            font-weight: bold;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Регистрация</h1>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="username">👤 Имя пользователя</label>
                <input type="text" id="username" placeholder="username" required minlength="3">
            </div>
            
            <div class="form-group">
                <label for="phone">📱 Телефон (обязательно)</label>
                <input type="tel" id="phone" placeholder="+7 (999) 123-45-67" required>
            </div>
            
            <div class="form-group">
                <label for="password">🔑 Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">🔑 Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль" required minlength="6">
            </div>
            
            <button type="button" onclick="register()" class="btn">
                🚀 Зарегистрироваться
            </button>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </form>
        
        <div class="links">
            <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            <p><a href="index.html">← На главную</a></p>
        </div>
    </div>

    <script>
        // ==================== FIREBASE КОНФИГ ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBVF9ofJRXi39nF3n3wguSAG5EO5ZxyiCg",
            authDomain: "logovovr.firebaseapp.com",
            databaseURL: "https://logovovr-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "logovovr",
            storageBucket: "logovovr.firebasestorage.app",
            messagingSenderId: "292582907362",
            appId: "1:292582907362:web:399e38ee37f4b20ab52dbb"
        };
        
        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        console.log("🔥 Firebase подключён!");
        
        // ==================== РЕГИСТРАЦИЯ ====================
        async function register() {
            try {
                hideMessages();
                
                const email = document.getElementById('email').value.trim();
                const username = document.getElementById('username').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (!email || !username || !phone || !password || !confirmPassword) {
                    showError('Заполните все поля');
                    return;
                }
                
                if (!email.includes('@')) {
                    showError('Введите корректный email');
                    return;
                }
                
                if (username.length < 3) {
                    showError('Имя пользователя должно быть не менее 3 символов');
                    return;
                }
                
                if (phone.replace(/\D/g, '').length < 10) {
                    showError('Введите корректный номер телефона');
                    return;
                }
                
                if (password.length < 6) {
                    showError('Пароль должен быть не менее 6 символов');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Пароли не совпадают');
                    return;
                }
                
                console.log('📝 Регистрация пользователя:', email, username, phone);
                
                // ШАГ 1: Регистрация в Firebase Auth
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                console.log('✅ Пользователь создан в Auth:', user.uid);
                showStatus('✅ Аккаунт создан, настраиваем профиль...');
                
                // ШАГ 2: Создание профиля в Realtime Database
                const now = new Date().toISOString();
                
                await database.ref('profiles/' + user.uid).set({
                    id: user.uid,
                    email: email,
                    username: username,
                    phone: phone,
                    user_type: 'user', // По умолчанию обычный пользователь
                    created_at: now,
                    last_login_at: now,
                    updated_at: now
                });
                
                console.log('✅ Профиль создан в Realtime Database');
                showStatus('✅ Профиль создан, настраиваем статистику...');
                
                // ШАГ 3: Создание статистики для чайника
                await database.ref('user_stats/' + user.uid).set({
                    user_id: user.uid,
                    username: username,
                    total_brews: 0,
                    tea_count: 0,
                    coffee_count: 0,
                    quantum_count: 0,
                    total_points: 0,
                    last_updated: now
                });
                
                console.log('✅ Статистика создана');
                showStatus('✅ Статистика создана, отправляем подтверждение...');
                
                // ШАГ 4: Отправка письма с подтверждением email
                await user.sendEmailVerification({
                    url: 'https://timon4ikru.github.io/LogovoVR/login.html'
                });
                
                console.log('✅ Письмо подтверждения отправлено');
                
                // Успех - всё синхронизировано!
                showSuccess(`
                    ✅ Регистрация успешна!<br>
                    📧 Проверьте email для подтверждения<br>
                    🔄 Все данные синхронизированы
                `);
                
                document.getElementById('registerForm').reset();
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 5000);
                
            } catch (error) {
                console.error('❌ Ошибка регистрации:', error);
                
                // Обработка ошибок Firebase
                let errorMessage = 'Ошибка регистрации';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Пользователь с таким email уже существует';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Неверный формат email';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Слишком слабый пароль. Используйте минимум 6 символов';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Проблема с сетью. Проверьте подключение';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Слишком много попыток. Попробуйте позже';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                showError(errorMessage);
            }
        }
        
        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.innerHTML = message;
            errorEl.style.display = 'block';
            
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.innerHTML = message;
            successEl.style.display = 'block';
            
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 5000);
        }

        function showStatus(message) {
            const statusEl = document.getElementById('successMessage');
            statusEl.innerHTML = message;
            statusEl.style.display = 'block';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        // Маска для телефона
        document.getElementById('phone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length > 0) {
                let formatted = '+7';
                if (value.length > 1) {
                    formatted += ' (' + value.substring(1, 4);
                }
                if (value.length >= 4) {
                    formatted += ') ' + value.substring(4, 7);
                }
                if (value.length >= 7) {
                    formatted += '-' + value.substring(7, 9);
                }
                if (value.length >= 9) {
                    formatted += '-' + value.substring(9, 11);
                }
                e.target.value = formatted;
            }
        });
        
        // Авто-ввод при нажатии Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                register();
            }
        });
        
        // Проверяем, если пользователь уже авторизован, перенаправляем
        document.addEventListener('DOMContentLoaded', async function() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    console.log('Пользователь уже авторизован, перенаправляем...');
                    window.location.href = 'booking.html';
                }
            });
        });
    </script>
</body>
</html>
