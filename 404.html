<!DOCTYPE html>
<html>
<head>
    <title>404 - Я кто? Я что? Я?</title>
    <link ref="icon" href="logo.png">
    <style>
        body {
            background: #0a0a0a;
            color: #00ff88;
            text-align: center;
            font-family: monospace;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #00ff88;
        }
        .message {
            font-size: 1.5em;
            color: #00cc66;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>404 - Тут ничего нет. Совсем.</h1>
    <div class="message">Не ругайся насяльника!</div>
    <div class="message">Оно само сбежало, мы ни причём!</div>
    <div style="font-size: 3em;">👻🔍🚶‍♂️</div>

    <audio id="errorSound" autoplay>
        <source src="err_snds/HTML404.mp3" type="audio/mpeg">
        Твой браузер не поддерживает аудио.
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('errorSound');
            audio.play().catch(error => {
                console.log('Автовоспроизведение заблокировано:', error);
            });
        });
    </script>
</body>
</html>
