<!DOCTYPE html>
<html>
<head>
    <title>Таблица лидеров - Чайник Logovo VR</title>
    <style>
        body { background: #0a0a0a; color: #00ff88; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #ffaa00; margin: 20px 0; font-size: 2.5em; }
        .filters { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .filter-btn { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: all 0.3s; }
        .filter-btn.active { background: #00ff88; color: #000; }
        .filter-btn:hover { background: rgba(0, 255, 136, 0.3); }
        .period-selector { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .period-btn { background: rgba(255, 170, 0, 0.1); border: 1px solid #ffaa00; color: #ffaa00; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .period-btn.active { background: #ffaa00; color: #000; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .leaderboard-table th { background: rgba(0, 255, 136, 0.2); color: #00ff88; padding: 12px; text-align: left; border: 1px solid #00ff88; }
        .leaderboard-table td { padding: 10px 12px; border: 1px solid rgba(0, 255, 136, 0.3); color: #8fd493; }
        .leaderboard-table tr:nth-child(even) { background: rgba(0, 255, 136, 0.05); }
        .leaderboard-table tr:hover { background: rgba(0, 255, 136, 0.1); }
        .rank-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.2), transparent) !important; color: #FFD700 !important; }
        .rank-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.2), transparent) !important; color: #C0C0C0 !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.2), transparent) !important; color: #CD7F32 !important; }
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        .stats-card { background: rgba(0, 255, 136, 0.05); border: 1px solid #00ff88; border-radius: 10px; padding: 20px; }
        .stats-card h3 { color: #ffaa00; margin-bottom: 15px; }
        .back-link { display: inline-block; margin-top: 20px; color: #00ff88; text-decoration: none; border: 1px solid #00ff88; padding: 8px 15px; border-radius: 5px; }
        .drink-icon { font-size: 1.2em; margin-right: 5px; }
        .loading { text-align: center; padding: 50px; color: #666; }
        @media (max-width: 768px) { .filters, .period-selector { flex-direction: column; align-items: center; } .filter-btn, .period-btn { width: 200px; } }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>🏆 ТАБЛИЦА ЛИДЕРОВ ЧАЙНИКА</h1>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterBy('all')">Все напитки</button>
            <button class="filter-btn" onclick="filterBy('tea')">🍵 Только чай</button>
            <button class="filter-btn" onclick="filterBy('coffee')">☕ Только кофе</button>
            <button class="filter-btn" onclick="filterBy('quantum')">⚛️ Только квантовые</button>
        </div>
        
        <div class="period-selector">
            <button class="period-btn active" onclick="setPeriod('overall')">За всё время</button>
            <button class="period-btn" onclick="setPeriod('year')">За год</button>
            <button class="period-btn" onclick="setPeriod('month')">За месяц</button>
            <button class="period-btn" onclick="setPeriod('week')">За неделю</button>
            <button class="period-btn" onclick="setPeriod('today')">За сегодня</button>
        </div>
        
        <div id="leaderboard">
            <div class="loading">Загрузка таблицы лидеров...</div>
        </div>
        
        <div class="stats-summary" id="statsSummary">
            <!-- Статистика загрузится здесь -->
        </div>
        
        <a href="tea.html" class="back-link">← Назад к чайнику</a>
    </div>

    <script>
        // ==================== FIREBASE КОНФИГ ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBVF9ofJRXi39nF3n3wguSAG5EO5ZxyiCg",
            authDomain: "logovovr.firebaseapp.com",
            databaseURL: "https://logovovr-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "logovovr",
            storageBucket: "logovovr.firebasestorage.app",
            messagingSenderId: "292582907362",
            appId: "1:292582907362:web:399e38ee37f4b20ab52dbb",
            measurementId: "G-C6TSBP2J7P"
        };
        
        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const analytics = firebase.analytics();
        
        console.log("🔥 Firebase подключён!");
        
        let currentFilter = 'all';
        let currentPeriod = 'overall';

        document.addEventListener('DOMContentLoaded', async function() {
            await loadLeaderboard();
            await loadStatsSummary();
        });

        function filterBy(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadLeaderboard();
        }

        function setPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            const leaderboardDiv = document.getElementById('leaderboard');
            leaderboardDiv.innerHTML = '<div class="loading">Загрузка таблицы лидеров...</div>';
            
            try {
                // Загружаем все записи из leaderboard
                const snapshot = await database.ref('leaderboard').once('value');
                const recordsData = snapshot.val();
                
                let allRecords = [];
                if (recordsData) {
                    allRecords = Object.keys(recordsData).map(key => ({
                        id: key,
                        ...recordsData[key]
                    }));
                }
                
                // Если записей нет
                if (!allRecords || allRecords.length === 0) {
                    leaderboardDiv.innerHTML = '<div style="text-align:center; padding:50px; color:#666;">Еще нет записей в таблице лидеров</div>';
                    return;
                }
                
                // Применяем фильтр по периоду
                let filteredRecords = allRecords;
                const now = new Date();
                
                if (currentPeriod !== 'overall') {
                    const periodStart = new Date(now);
                    
                    if (currentPeriod === 'year') {
                        periodStart.setMonth(0, 1); // Начало года
                        periodStart.setHours(0, 0, 0, 0);
                    } else if (currentPeriod === 'month') {
                        periodStart.setDate(1); // Начало месяца
                        periodStart.setHours(0, 0, 0, 0);
                    } else if (currentPeriod === 'week') {
                        periodStart.setDate(now.getDate() - 7);
                    } else if (currentPeriod === 'today') {
                        periodStart.setHours(0, 0, 0, 0);
                    }
                    
                    filteredRecords = allRecords.filter(r => {
                        const recordDate = new Date(r.created_at);
                        return recordDate >= periodStart;
                    });
                }
                
                // Группируем по пользователям
                const userStats = {};
                
                filteredRecords.forEach(record => {
                    const userId = record.user_id || 'anonymous';
                    const username = record.username || record.user_email || 'Аноним';
                    
                    if (!userStats[userId]) {
                        userStats[userId] = {
                            username: username,
                            total_brews: 0,
                            tea_count: 0,
                            coffee_count: 0,
                            quantum_count: 0,
                            total_points: 0,
                            last_updated: record.created_at
                        };
                    }
                    
                    userStats[userId].total_brews++;
                    
                    if (record.drink === 'tea') {
                        userStats[userId].tea_count++;
                        userStats[userId].total_points += record.score || 10;
                    } else if (record.drink === 'coffee') {
                        userStats[userId].coffee_count++;
                        userStats[userId].total_points += record.score || 20;
                    } else if (record.drink === 'quantum') {
                        userStats[userId].quantum_count++;
                        userStats[userId].total_points += record.score || 50;
                    }
                    
                    if (new Date(record.created_at) > new Date(userStats[userId].last_updated)) {
                        userStats[userId].last_updated = record.created_at;
                    }
                });
                
                // Применяем фильтр по типу напитка
                let filteredUsers = Object.values(userStats);
                
                if (currentFilter === 'tea') {
                    filteredUsers = filteredUsers.filter(u => u.tea_count > 0);
                } else if (currentFilter === 'coffee') {
                    filteredUsers = filteredUsers.filter(u => u.coffee_count > 0);
                } else if (currentFilter === 'quantum') {
                    filteredUsers = filteredUsers.filter(u => u.quantum_count > 0);
                }
                
                // Сортируем по очкам
                filteredUsers.sort((a, b) => b.total_points - a.total_points);
                
                // Ограничиваем топ-100
                const topUsers = filteredUsers.slice(0, 100);
                
                // Отображаем таблицу
                let html = `<table class="leaderboard-table"><thead><tr>
                    <th>Место</th>
                    <th>Игрок</th>
                    <th>Всего варок</th>
                    <th>🍵 Чай</th>
                    <th>☕ Кофе</th>
                    <th>⚛️ Квант</th>
                    <th>🔥 Очки</th>
                    <th>🎯 Ср. очки</th>
                    <th>Обновлено</th>
                </tr></thead><tbody>`;
                
                topUsers.forEach((user, index) => {
                    const rankClass = index < 3 ? `rank-${index + 1}` : '';
                    const avgPoints = user.total_brews > 0 ? (user.total_points / user.total_brews).toFixed(1) : '0.0';
                    const lastUpdated = user.last_updated ? new Date(user.last_updated).toLocaleDateString('ru-RU') : 'Н/Д';
                    
                    html += `<tr class="${rankClass}">
                        <td>${index + 1}</td>
                        <td>${user.username}</td>
                        <td>${user.total_brews}</td>
                        <td>${user.tea_count}</td>
                        <td>${user.coffee_count}</td>
                        <td>${user.quantum_count}</td>
                        <td><strong>${user.total_points}</strong></td>
                        <td>${avgPoints}</td>
                        <td>${lastUpdated}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                leaderboardDiv.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки leaderboard:', error);
                leaderboardDiv.innerHTML = '<div style="color:#f00; text-align:center;">Ошибка загрузки таблицы лидеров</div>';
            }
        }

        async function loadStatsSummary() {
            try {
                const snapshot = await database.ref('leaderboard').once('value');
                const recordsData = snapshot.val();
                
                let allRecords = [];
                if (recordsData) {
                    allRecords = Object.keys(recordsData).map(key => ({
                        id: key,
                        ...recordsData[key]
                    }));
                }
                
                // Если нет записей
                if (!allRecords || allRecords.length === 0) {
                    const statsDiv = document.getElementById('statsSummary');
                    statsDiv.innerHTML = '<div class="stats-card"><h3>📊 СТАТИСТИКА</h3><div>Еще нет записей в таблице лидеров</div></div>';
                    return;
                }
                
                // Общая статистика
                const totalBrews = allRecords.length;
                const totalTea = allRecords.filter(r => r.drink === 'tea').length;
                const totalCoffee = allRecords.filter(r => r.drink === 'coffee').length;
                const totalQuantum = allRecords.filter(r => r.drink === 'quantum').length;
                const totalScore = allRecords.reduce((sum, r) => sum + (r.score || 0), 0);
                
                // Статистика за последние 7 дней
                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                const recentBrews = allRecords.filter(r => new Date(r.created_at) > weekAgo);
                const recentCount = recentBrews.length;
                
                // Самый активный пользователь
                const userBrews = {};
                allRecords.forEach(record => {
                    const userId = record.user_id || 'anonymous';
                    userBrews[userId] = (userBrews[userId] || 0) + 1;
                });
                
                const userIds = Object.keys(userBrews);
                const mostActiveUserId = userIds.length > 0 ? 
                    userIds.reduce((a, b) => userBrews[a] > userBrews[b] ? a : b) : '';
                const mostActiveCount = mostActiveUserId ? userBrews[mostActiveUserId] : 0;
                
                const statsDiv = document.getElementById('statsSummary');
                statsDiv.innerHTML = `
                    <div class="stats-card">
                        <h3>📊 ОБЩАЯ СТАТИСТИКА</h3>
                        <div>Всего варок: <strong>${totalBrews}</strong></div>
                        <div>Общий счёт: <strong>${totalScore}</strong></div>
                        <div>🍵 Чая сварено: <strong>${totalTea}</strong></div>
                        <div>☕ Кофе сварено: <strong>${totalCoffee}</strong></div>
                        <div>⚛️ Квантовых напитков: <strong>${totalQuantum}</strong></div>
                    </div>
                    <div class="stats-card">
                        <h3>🔥 АКТИВНОСТЬ</h3>
                        <div>За последние 7 дней: <strong>${recentCount} варок</strong></div>
                        <div>Варок в день: <strong>${(recentCount / 7).toFixed(1)}</strong></div>
                        <div>Самый активный: <strong>${mostActiveCount} варок</strong></div>
                        <div>Квантовый шанс: <strong>${totalBrews > 0 ? (totalQuantum/totalBrews*100).toFixed(2) : '0.00'}%</strong></div>
                    </div>
                    <div class="stats-card">
                        <h3>🎯 СРЕДНИЕ ПОКАЗАТЕЛИ</h3>
                        <div>Очков за варку: <strong>${totalBrews > 0 ? (totalScore/totalBrews).toFixed(1) : '0'}</strong></div>
                        <div>Чая на игрока: <strong>${userIds.length > 0 ? (totalTea/userIds.length).toFixed(1) : '0'}</strong></div>
                        <div>Кофе на игрока: <strong>${userIds.length > 0 ? (totalCoffee/userIds.length).toFixed(1) : '0'}</strong></div>
                        <div>Всего игроков: <strong>${userIds.length}</strong></div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }
    </script>
</body>
</html>
