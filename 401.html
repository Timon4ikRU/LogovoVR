<!DOCTYPE html>
<html>
<head>
    <title>401 - Кто ты, воин?</title>
    <link ref="icon" href="logo.png">
    <style>
        body {
            background: #0a0a0a;
            color: #ff4444;
            text-align: center;
            font-family: monospace;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #ff0000;
        }
        .message {
            font-size: 1.5em;
            color: #ff6666;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>401 - Ты кто такой?</h1>
    <div class="message">Я тебя не звал - иди отсюда!</div>
    <div class="message">А хотя... ладно, только представься сначала!</div>
    <div style="font-size: 3em;">🚫👤❓</div>

    <audio id="errorSound" autoplay>
        <source src="err_snds/HTML401.mp3" type="audio/mpeg">
        Твой браузер не поддерживает аудио.
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('errorSound');
            audio.play().catch(error => {
                console.log('Автовоспроизведение заблокировано:', error);
            });
        });
    </script>
</body>
</html>
