<!DOCTYPE html>
<html>
<head>
    <title>Вход - Logovo VR</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            background: rgba(0, 255, 136, 0.05);
        }
        h1 { 
            color: #ffaa00;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: white;
            font-family: monospace;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 5px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #00cc66;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        .error {
            color: #ff4444;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 5px;
            display: none;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: #ffaa00;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .status {
            color: #00ff88;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вход в систему</h1>
        
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        
        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль" required>
        </div>
        
        <button onclick="login()" id="loginBtn">Войти</button>
        
        <div id="status" class="status"></div>
        <div id="error" class="error"></div>
        
        <div class="links">
            <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            <p><a href="index.html">← На главную</a></p>
        </div>
    </div>

    <script>
        // ============== FIREBASE КОНФИГ ==============
        const firebaseConfig = {
            apiKey: "AIzaSyBVF9ofJRXi39nF3n3wguSAG5EO5ZxyiCg",
            authDomain: "logovovr.firebaseapp.com",
            databaseURL: "https://logovovr-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "logovovr",
            storageBucket: "logovovr.firebasestorage.app",
            messagingSenderId: "292582907362",
            appId: "1:292582907362:web:399e38ee37f4b20ab52dbb",
            measurementId: "G-C6TSBP2J7P"
        };
        
        // ИНИЦИАЛИЗАЦИЯ FIREBASE
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        console.log("🔥 Firebase подключён!");
        
        // ============== ФУНКЦИИ ==============
        async function checkAuth() {
            try {
                firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        window.location.href = 'index.html';
                    }
                });
            } catch (error) {
                console.log('Пользователь не авторизован');
            }
        }
        
        // Функция обновления last_login_at
        async function updateLastLogin(userId) {
            try {
                await database.ref('profiles/' + userId).update({
                    last_login_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                });
                return true;
            } catch (error) {
                console.error('Ошибка обновления last_login:', error);
                return false;
            }
        }
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            document.getElementById('error').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            
            if (!email || !password) {
                showError('Заполните все поля');
                return;
            }
            
            // Блокируем кнопку
            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';
            loginBtn.style.opacity = '0.7';
            
            // Функция для повторных попыток
            async function tryLogin(attempt = 1, maxAttempts = 3) {
                try {
                    // Пробуем войти
                    const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    
                    // Если вход успешен
                    showStatus('Вход выполнен, обновляем данные...');
                    
                    if (user) {
                        const updateSuccess = await updateLastLogin(user.uid);
                        if (updateSuccess) {
                            showStatus('Данные обновлены! Перенаправление...');
                        } else {
                            showStatus('Вход выполнен! Перенаправление...');
                        }
                    }
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                    
                } catch (error) {
                    console.error('Firebase Auth Error:', error);
                    
                    // Обработка разных кодов ошибок Firebase
                    let errorMessage = 'Ошибка входа';
                    
                    switch (error.code) {
                        case 'auth/invalid-email':
                            errorMessage = 'Неверный формат email';
                            break;
                        case 'auth/user-disabled':
                            errorMessage = 'Пользователь заблокирован';
                            break;
                        case 'auth/user-not-found':
                            errorMessage = 'Пользователь не найден';
                            break;
                        case 'auth/wrong-password':
                            errorMessage = 'Неверный пароль';
                            break;
                        case 'auth/too-many-requests':
                            errorMessage = 'Слишком много попыток. Попробуйте позже';
                            break;
                        case 'auth/network-request-failed':
                            // Сетевая ошибка - пробуем повторить
                            if (attempt < maxAttempts) {
                                showStatus(`Повторная попытка ${attempt}/${maxAttempts}...`);
                                await new Promise(resolve => setTimeout(resolve, 1000 * attempt));
                                return tryLogin(attempt + 1, maxAttempts);
                            }
                            errorMessage = 'Проблема с сетью. Проверьте подключение к интернету';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    
                    showError(errorMessage);
                    
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Войти';
                    loginBtn.style.opacity = '1';
                }
            }
            
            // Запускаем первую попытку
            await tryLogin();
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.innerHTML = message;
            errorEl.style.display = 'block';
        }
        
        function showStatus(message) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = message;
            statusEl.style.display = 'block';
        }
        
        // ============== ИНИЦИАЛИЗАЦИЯ ==============
        document.addEventListener('DOMContentLoaded', function() {
            // Проверяем авторизацию при загрузке
            checkAuth();
            
            // Enter для входа
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    login();
                }
            });
            
            // Фокус на email поле
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
