<!DOCTYPE html>
<html>
<head>
    <title>Вход - Logovo VR</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <link rel="icon" href="favicon.ico">
    <style>

        @font-face {
            font-family: 'Google Sans Code';
            src: url('/LogovoVR/fonts/GoogleSansCode-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Google Sans Code';
            background: #0a0a0a;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            background: rgba(0, 255, 136, 0.05);
        }
        h1 { 
            color: #ffaa00;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: white;
            font-family: monospace;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 5px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #00cc66;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        .google-btn {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover {
            background: #f1f1f1;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        .separator {
            margin: 20px 0;
            text-align: center;
            color: #666;
            position: relative;
        }
        .separator::before,
        .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #333;
        }
        .separator::before { left: 0; }
        .separator::after { right: 0; }
        .error {
            color: #ff4444;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 5px;
            display: none;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: #ffaa00;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .status {
            color: #00ff88;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Вход в систему</h1>
        
        <div class="input-group">
            <label for="email">📧 Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        
        <div class="input-group">
            <label for="password">🔑 Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>
        
        <button onclick="loginWithEmail()">📧 Войти с email</button>
        
        <div class="separator">или</div>
        
        <button onclick="loginWithGoogle()" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Войти с Google
        </button>
        
        <div id="status" class="status"></div>
        <div id="error" class="error"></div>
        
        <div class="links">
            <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            <p><a href="index.html">← На главную</a></p>
        </div>
    </div>

    <script>
        // ==================== FIREBASE КОНФИГ ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBVF9ofJRXi39nF3n3wguSAG5EO5ZxyiCg",
            authDomain: "logovovr.firebaseapp.com",
            databaseURL: "https://logovovr-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "logovovr",
            storageBucket: "logovovr.firebasestorage.app",
            messagingSenderId: "292582907362",
            appId: "1:292582907362:web:399e38ee37f4b20ab52dbb"
        };
        
        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ==================== ВХОД С EMAIL ====================
        async function loginWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            hideMessages();
            
            if (!email || !password) {
                showError('Заполните все поля');
                return;
            }
            
            showStatus('Вход...');
            
            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Обновляем last_login
                await database.ref('profiles/' + user.uid + '/last_login_at').set(Date.now());
                
                showStatus('Успешный вход! Перенаправление...');
                setTimeout(() => window.location.href = 'index.html', 1000);
                
            } catch (error) {
                handleAuthError(error);
            }
        }

        // ==================== ВХОД С GOOGLE ====================
        async function loginWithGoogle() {
            hideMessages();
            showStatus('Вход через Google...');
            
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');
                
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                
                // Проверяем, есть ли профиль
                const profileSnap = await database.ref('profiles/' + user.uid).once('value');
                
                if (!profileSnap.exists()) {
                    // Создаем профиль если его нет
                    const now = Date.now();
                    await database.ref('profiles/' + user.uid).set({
                        id: user.uid,
                        email: user.email,
                        username: user.displayName || user.email.split('@')[0],
                        phone: user.phoneNumber || '',
                        user_type: 'user',
                        created_at: now,
                        last_login_at: now,
                        updated_at: now
                    });
                    
                    // Создаем статистику
                    await database.ref('user_stats/' + user.uid).set({
                        user_id: user.uid,
                        username: user.displayName || user.email.split('@')[0],
                        total_brews: 0,
                        tea_count: 0,
                        coffee_count: 0,
                        quantum_count: 0,
                        total_points: 0,
                        last_updated: now
                    });
                } else {
                    // Обновляем last_login
                    await database.ref('profiles/' + user.uid + '/last_login_at').set(Date.now());
                }
                
                showStatus('Успешный вход! Перенаправление...');
                setTimeout(() => window.location.href = 'index.html', 1000);
                
            } catch (error) {
                console.error('Google login error:', error);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showError('Вход отменён');
                } else if (error.code === 'auth/unauthorized-domain') {
                    showError('Домен не авторизован');
                } else {
                    handleAuthError(error);
                }
            }
        }

        // ==================== ОБРАБОТКА ОШИБОК ====================
        function handleAuthError(error) {
            console.error('Auth error:', error);
            
            let message = 'Ошибка входа';
            switch (error.code) {
                case 'auth/invalid-email':
                    message = 'Неверный формат email';
                    break;
                case 'auth/user-disabled':
                    message = 'Пользователь заблокирован';
                    break;
                case 'auth/user-not-found':
                    message = 'Пользователь не найден';
                    break;
                case 'auth/wrong-password':
                    message = 'Неверный пароль';
                    break;
                case 'auth/too-many-requests':
                    message = 'Слишком много попыток. Попробуйте позже';
                    break;
                case 'auth/network-request-failed':
                    message = 'Проблема с сетью';
                    break;
                default:
                    message = error.message;
            }
            showError(message);
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
        function showError(message) {
            document.getElementById('error').innerHTML = message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('status').style.display = 'none';
        }
        
        function showStatus(message) {
            document.getElementById('status').innerHTML = message;
            document.getElementById('status').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('status').style.display = 'none';
        }

        // Проверка авторизации
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                console.log('Уже авторизован:', user.email);
            }
        });

        // Enter для входа
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginWithEmail();
        });
    </script>
</body>
</html>
